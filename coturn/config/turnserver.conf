# ============================================================
# Coturn 配置文件
# 外部 IP: 10.10.10.130  容器内网 IP: 172.30.42.2（须与 docker-compose turn_net 中 coturn 的 ipv4_address 一致）
# ============================================================

# 基础配置
listening-port=3478
listening-ip=0.0.0.0

# Relay 端口范围（需与 docker-compose.yml 端口映射一致）
min-port=50000
max-port=50100

# 认证（长期凭证机制）
lt-cred-mech
realm=turn.internal.local
user=user:password

# 网络映射（格式: 外网IP/容器内网IP）
external-ip=10.10.10.130/172.30.42.2
relay-ip=172.30.42.2

# 安全
fingerprint
total-quota=100
bps-capacity=0
stale-nonce=600

# 禁用 TLS/DTLS（内网部署，按需开启）
no-tls
no-dtls

# 日志（去掉 no-stdout-log 使 docker logs 正常输出）
log-file=/var/log/turnserver.log
verbose

# PID 文件（路径对应 docker-compose 中 ./coturn/run 挂载）
pid-file=/var/run/coturn/turnserver.pid
